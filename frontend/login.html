<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign In to PicPicky</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#207fdf",
                    "background-light": "#f6f7f8",
                    "background-dark": "#111921",
                },
                fontFamily: {
                    "display": ["Inter", "sans-serif"]
                },
                borderRadius: {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
                },
            },
        },
    }
</script>
<style type="text/tailwindcss">
    body {
        font-family: 'Inter', sans-serif;
        margin: 0;
        padding: 0;
    }
    .hero-overlay {
        background: linear-gradient(to right, rgba(17, 25, 33, 0.4) 0%, rgba(17, 25, 33, 0.1) 100%);
    }
    .form-container-blur {
        backdrop-filter: blur(8px);
    }
</style>
</head>

<body class="bg-background-dark text-slate-100 antialiased">
<div class="flex h-screen w-full flex-col lg:flex-row">

    <!-- ── Left Hero Panel ── -->
    <div class="relative hidden lg:flex lg:w-3/5 xl:w-2/3 h-full overflow-hidden">
        <div class="absolute inset-0 bg-cover bg-center transition-transform duration-1000 hover:scale-105"
            style="background-image: url('login_img.png');">
        </div>
        <div class="absolute inset-0 hero-overlay"></div>
 
    </div>

    <!-- ── Right Form Panel ── -->
    <!-- ✅ Changed overflow-hidden to overflow-y-auto so nothing gets cut off -->
    <div class="flex flex-1 flex-col justify-center items-center px-6 sm:px-12 lg:px-16 xl:px-24 bg-background-dark overflow-y-auto pt-0">
        <div class="w-full max-w-md space-y-1">

            <!-- ✅ Logo + Heading grouped - bigger logo, close spacing -->
            <div class="flex flex-col items-center gap-8">
                <img 
                src="PIC-logo.png"
                class="h-42 scale-110 w-auto object-contain"
                alt="PicPicky Logo"
                />
                <!-- ✅ -mt-3 pulls heading closer to logo -->
                <div class="text-center space-y-2 -mt-3">
                    <h1 class="text-4xl font-bold text-white tracking-tight">Login</h1>
                    <p class="text-slate-400 text-base">
                        Access your PicPicky dashboard and manage your visual analysis.
                    </p>
                    <br>
                </div>
            </div>

            <!-- Form -->
            <form class="space-y-5">
                <div class="space-y-4">

                    <!-- Email -->
                    <div class="flex flex-col gap-1.5">
                        <label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="email">
                            Email Address
                        </label>
                        <input
                            class="flex w-full rounded-lg border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 px-4 py-3.5 text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none"
                            id="email"
                            name="email"
                            placeholder="name@photographer.com"
                            type="email"
                        />
                    </div>

                    <!-- Password -->
                    <div class="flex flex-col gap-1.5">
                        <div class="flex items-center justify-between">
                            <label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="password">
                                Password
                            </label>
                            <!-- Forgot Password Link -->
                            <a href="forgot_pass.html" class="text-sm font-medium text-primary hover:text-primary/80 transition-colors">
                                Forgot password?
                            </a>
                        </div>
                        <div class="relative group">
                            <input
                                class="flex w-full rounded-lg border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 px-4 py-3.5 text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none"
                                id="password"
                                name="password"
                                placeholder="••••••••"
                                type="password"
                            />
                            <button
                                onclick="togglePassword('password', this)"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors"
                                type="button"
                            >
                                <span class="material-symbols-outlined text-[20px]">visibility</span>
                            </button>
                        </div>

                        <!-- Error Message -->
                        <p id="loginError" class="mt-2 text-sm text-red-500 hidden"></p>
                    </div>
                </div>

                <!-- Submit Button -->
                <div>
                    <button
                        class="flex w-full items-center justify-center rounded-lg bg-primary px-4 py-3.5 text-sm font-bold text-white shadow-lg shadow-primary/20 hover:bg-primary/90 hover:shadow-primary/30 active:scale-[0.98] transition-all"
                        type="submit"
                    >
                        Sign In
                    </button>
                </div>
            </form>

            <!-- Sign Up Link -->
            <p class="text-center text-sm text-slate-500 dark:text-slate-400">
                Don't have an account?
                <a class="font-semibold text-primary hover:text-primary/80 transition-colors" href="register.html">
                    Sign up for free
                </a>
            </p>

        </div>
    </div>
</div>

<script>
// ── Admin Credentials ──
const ADMIN_CREDENTIALS = [
    {
        email: "bushrafathima2610@gmail.com",
        password: "Bushra@123",
        name: "Admin User",
        role: "Super Admin"
    },
    {
        email: "mevanpaiva@gmail.com",
        password: "Mary@123",
        name: "Secondary Admin",
        role: "Admin"
    }
];

document.addEventListener("DOMContentLoaded", function () {
    const loginForm = document.querySelector("form");
    const errorBox = document.getElementById("loginError");

    loginForm.addEventListener("submit", async function (e) {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        // Reset error
        errorBox.textContent = "";
        errorBox.classList.add("hidden");

        // Basic validation
        if (!email || !password) {
            errorBox.textContent = "Please enter email and password.";
            errorBox.classList.remove("hidden");
            return;
        }

        // ── Check if admin ──
        const adminLocal = ADMIN_CREDENTIALS.find(
            a => a.email === email && a.password === password
        );

        if (adminLocal) {
            try {
                const response = await fetch("http://127.0.0.1:8000/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    sessionStorage.setItem('adminSession', JSON.stringify({
                        email: adminLocal.email,
                        name: adminLocal.name,
                        role: adminLocal.role,
                        token: data.access_token,
                        loginTime: new Date().toISOString()
                    }));
                } else {
                    sessionStorage.setItem('adminSession', JSON.stringify({
                        email: adminLocal.email,
                        name: adminLocal.name,
                        role: adminLocal.role,
                        token: null,
                        loginTime: new Date().toISOString()
                    }));
                }

            } catch (err) {
                sessionStorage.setItem('adminSession', JSON.stringify({
                    email: adminLocal.email,
                    name: adminLocal.name,
                    role: adminLocal.role,
                    token: null,
                    loginTime: new Date().toISOString()
                }));
            }

            window.location.href = "admin.html";
            return;
        }

        // ── Regular user login via backend ──
        try {
            const response = await fetch("http://127.0.0.1:8000/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                errorBox.classList.add("hidden");

                localStorage.setItem("token", data.access_token);
                localStorage.setItem("userName", data.name);
                localStorage.setItem("userEmail", data.email);

                if (data.is_admin) {
                    sessionStorage.setItem('adminSession', JSON.stringify({
                        email: data.email,
                        name: data.name,
                        role: "Super Admin",
                        token: data.access_token,
                        loginTime: new Date().toISOString()
                    }));
                    window.location.href = "admin.html";
                } else {
                    window.location.href = "upload.html";
                }

            } else {
                errorBox.textContent = data.detail || "Invalid email or password.";
                errorBox.classList.remove("hidden");
            }

        } catch (error) {
            console.error("Login error:", error);
            errorBox.textContent = "Server error. Please try again.";
            errorBox.classList.remove("hidden");
        }
    });
});

// ── Toggle Password Visibility ──
function togglePassword(fieldId, btn) {
    const input = document.getElementById(fieldId);
    const icon = btn.querySelector('span');
    if (input.type === "password") {
        input.type = "text";
        icon.textContent = "visibility_off";
    } else {
        input.type = "password";
        icon.textContent = "visibility";
    }
}
</script>

</body>
</html>
